<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Customer Insights Hub (Demo)</title>

<style>
:root{
  --bg:#f5f6f8;
  --panel:#ffffff;
  --border:#e5e7eb;
  --text:#111827;
  --muted:#6b7280;
  --accent:#c8102e;
  --good:#16a34a;
  --bad:#dc2626;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
  background:linear-gradient(180deg,#fafafa,#f1f2f4);
  color:var(--text);
}
header{
  padding:16px 24px;
  background:#fff;
  border-bottom:1px solid var(--border);
  font-weight:900;
}
.container{max-width:1100px;margin:auto;padding:24px}
.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:14px;
  padding:16px;
  margin-bottom:20px;
}
.title{font-size:20px;font-weight:900}
.sub{font-size:13px;color:var(--muted);margin-top:4px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.btn{
  padding:8px 12px;
  border-radius:10px;
  border:1px solid var(--border);
  background:#fff;
  cursor:pointer;
  font-weight:700;
}
.btn.primary{background:var(--accent);color:#fff;border:none}
input{padding:6px;border:1px solid var(--border);border-radius:8px;width:100%}
table{width:100%;border-collapse:collapse;font-size:13px}
td,th{border-bottom:1px solid var(--border);padding:8px}
.progress{height:10px;background:#e5e7eb;border-radius:999px;overflow:hidden}
.progress span{display:block;height:100%;background:var(--accent)}
</style>
</head>

<body>

<header>Customer Insights Hub — Demo</header>

<main class="container">

<!-- MENU / COCKTAIL CALCULATOR -->
<section class="card">
  <div class="title">Menu Bar / Cocktail Calculator</div>
  <div class="sub">Build a cocktail and see cost, pour %, and margin.</div>

  <table>
    <thead>
      <tr><th>Ingredient</th><th>Bottle $</th><th>Bottle oz</th><th>Recipe oz</th></tr>
    </thead>
    <tbody id="cocktailBody"></tbody>
  </table>

  <button class="btn" onclick="addIngredient()">+ Add Ingredient</button>

  <div class="row" style="margin-top:16px">
    <div>
      <label class="sub">Target Pour Cost %</label>
      <input id="targetPour" type="number" value="20"/>
    </div>
    <div>
      <label class="sub">Menu Price ($)</label>
      <input id="menuPrice" type="number" value="14"/>
    </div>
  </div>

  <div id="cocktailResults" class="sub" style="margin-top:12px"></div>
</section>

<!-- POUR COST CALCULATOR -->
<section class="card">
  <div class="title">Pour Cost Calculator</div>
  <div class="sub">Quick pricing math for a single bottle.</div>

  <div class="row">
    <div>
      <label class="sub">Bottle Cost ($)</label>
      <input id="pcBottleCost" value="60"/>
    </div>
    <div>
      <label class="sub">Bottle Size (oz)</label>
      <input id="pcBottleOz" value="25.4"/>
    </div>
    <div>
      <label class="sub">Pour Size (oz)</label>
      <input id="pcPourOz" value="1.5"/>
    </div>
    <div>
      <label class="sub">Target Pour %</label>
      <input id="pcTarget" value="20"/>
    </div>
  </div>

  <button class="btn primary" onclick="calcPour()">Calculate</button>
  <div id="pcOut" class="sub" style="margin-top:10px"></div>
</section>

<!-- MERCHANDISING -->
<section class="card">
  <div class="title">Merchandising / Perfect Merch</div>
  <div class="sub">Execution checklist with live score.</div>

  <div id="merchChecks"></div>
  <div class="progress" style="margin-top:10px"><span id="merchBar"></span></div>
  <div id="merchScore" class="sub"></div>
</section>

</main>

<script>
/* ---------- COCKTAIL CALC ---------- */
let cocktail=[
  {name:"Tequila",cost:60,oz:25.4,recipe:1.5},
  {name:"Lime",cost:5,oz:16,recipe:.75},
  {name:"Simple",cost:4,oz:16,recipe:.5}
];

function renderCocktail(){
  cocktailBody.innerHTML=cocktail.map(c=>`
    <tr>
      <td>${c.name}</td>
      <td>${c.cost}</td>
      <td>${c.oz}</td>
      <td>${c.recipe}</td>
    </tr>
  `).join("");

  const total= cocktail.reduce((s,c)=>s+(c.cost/c.oz*c.recipe),0);
  const price=+menuPrice.value;
  const pour=(total/price*100).toFixed(1);
  cocktailResults.innerHTML=
    `Drink Cost: $${total.toFixed(2)} • Pour Cost: ${pour}% • Gross: $${(price-total).toFixed(2)}`;
}
function addIngredient(){
  cocktail.push({name:"New",cost:10,oz:16,recipe:.5});
  renderCocktail();
}
menuPrice.oninput=renderCocktail;
renderCocktail();

/* ---------- POUR COST ---------- */
function calcPour(){
  const cost=pcBottleCost.value/pcBottleOz.value*pcPourOz.value;
  const suggested=(cost/(pcTarget.value/100));
  pcOut.innerHTML=
    `Cost per pour: $${cost.toFixed(2)} • Suggested price: $${suggested.toFixed(2)}`;
}

/* ---------- MERCH ---------- */
const merchItems=[
  "Pricing visible",
  "Facings straight",
  "Signage clean",
  "Display themed",
  "Out of stocks addressed"
];
merchChecks.innerHTML=merchItems.map((m,i)=>`
  <label>
    <input type="checkbox" onchange="updateMerch()"/> ${m}
  </label><br/>
`).join("");

function updateMerch(){
  const total=merchItems.length;
  const checked=[...merchChecks.querySelectorAll("input")].filter(x=>x.checked).length;
  const pct=Math.round(checked/total*100);
  merchBar.style.width=pct+"%";
  merchScore.innerHTML=`Perfect Merch Score: ${pct}%`;
}
</script>

</body>
</html>

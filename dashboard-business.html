<!-- My Business: Top Items -->
<section id="myBusiness" class="mt-4 rounded-3xl border border-white/10 bg-white/5 p-6 glass">
  <div class="flex flex-col gap-3 md:flex-row md:items-end md:justify-between">
    <div>
      <h2 class="text-xl font-black">My Business</h2>
      <p class="mt-1 text-sm text-slate-300">Top items and spend insights (demo data).</p>
    </div>

    <div class="flex gap-2">
      <button class="rangeBtn rounded-xl border border-white/10 bg-white/5 px-3 py-2 text-sm hover:bg-white/10" data-days="30">30 days</button>
      <button class="rangeBtn rounded-xl border border-white/10 bg-white/5 px-3 py-2 text-sm hover:bg-white/10" data-days="60">60 days</button>
      <button class="rangeBtn rounded-xl border border-white/10 bg-white/5 px-3 py-2 text-sm hover:bg-white/10" data-days="90">90 days</button>
    </div>
  </div>

  <div class="mt-4 grid gap-4 md:grid-cols-3">
    <div class="rounded-2xl border border-white/10 bg-slate-900/30 p-4">
      <div class="text-xs text-slate-300">Total Spend (YTD)</div>
      <div id="ytdSpend" class="mt-1 text-3xl font-black">—</div>
      <div class="mt-2 text-xs text-slate-400">Demo value</div>
    </div>

    <div class="md:col-span-2 rounded-2xl border border-white/10 bg-slate-900/30 p-4">
      <div class="flex items-center justify-between">
        <div class="font-extrabold">Top 10 items</div>
        <div id="rangeLabel" class="text-xs text-slate-300">Last 30 days</div>
      </div>
      <div class="mt-3 overflow-auto">
        <table class="w-full text-sm">
          <thead class="text-slate-300">
            <tr class="border-b border-white/10">
              <th class="py-2 text-left">Item</th>
              <th class="py-2 text-right">Units</th>
              <th class="py-2 text-right">Spend</th>
            </tr>
          </thead>
          <tbody id="topItemsTbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</section>
